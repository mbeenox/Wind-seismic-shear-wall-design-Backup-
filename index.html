<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plan Sketcher Suite</title>
    <style>
      /* Minimal host reset — the app injects all its own styling, but it
         relies on the page having no default body margin (its roots size to
         calc(100vh - 46px)). This lives in the host shell, NOT the app file. */
      html, body { margin: 0; padding: 0; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
